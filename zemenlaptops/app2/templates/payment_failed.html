<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full mx-4 bg-white p-8 rounded-xl shadow-xs border border-gray-100 text-center">
        <div class="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-4 text-rose-500">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">Payment Failed</h1>
        <p class="text-gray-500 mb-6">Something went wrong while processing your transaction. No funds were deducted.</p>

        {% if error %}
        <div class="bg-rose-50 border border-rose-100 text-rose-700 rounded-lg p-3 text-sm mb-6 text-left">
            <strong>Error Details:</strong> {{ error }}
        </div>
        {% elif order %}
        <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left text-sm space-y-2">
            <div class="flex justify-between"><span class="text-gray-500">Order ID:</span> <span class="font-medium text-gray-800">#{{ order.id }}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Reference:</span> <span class="font-medium text-gray-800 text-xs">{{ order.tx_ref }}</span></div>
        </div>
        {% endif %}

        <div class="space-y-2">
            <a href="javascript:history.back()" class="block w-full bg-rose-600 hover:bg-rose-700 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200">
                Try Again
            </a>
            <a href="/" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-4 rounded-lg transition-colors duration-200">
                Cancel & Go Home
            </a>
        </div>
    </div>

</body>
</html>
