{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zemen Laptops | Premium Tech Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light text-dark">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2 text-dark" href="{% url 'home' %}">
                <i class="bi bi-laptop text-warning fs-4"></i> <span>ZEMEN</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'laptop_catalog' %}active fw-semibold text-dark{% else %}text-secondary{% endif %}" href="{% url 'laptop_catalog' %}">Catalog</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-warning fw-bold px-4 d-flex align-items-center gap-2 shadow-sm text-dark" href="{% url 'cart_page' %}">
                            <i class="bi bi-cart3"></i> <span>Cart</span>
                            <span id="nav-cart-count" class="badge bg-dark text-warning rounded-pill ms-1">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="flex-grow-1 py-5">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>
    <footer class="py-5 mt-auto border-top bg-white">
        <div class="container">
            <div class="row align-items-center justify-content-between g-4">
                <div class="col-md-6 text-center text-md-start">
                    <h5 class="fw-bold text-dark mb-2">ZEMEN LAPTOPS</h5>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3 mb-2 fs-5">
                        <a href="#" class="link-secondary"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="link-secondary"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="link-secondary"><i class="bi bi-twitter-x"></i></a>
                    </div>
                    <p class="small text-muted mb-0">&copy; 2026 Zemen Laptops. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateGlobalNavbarCartCount() {
            const countElement = document.getElementById('nav-cart-count');
            if (countElement) {
                const cart = JSON.parse(localStorage.getItem('zemen_cart')) || [];
                countElement.textContent = cart.length;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateGlobalNavbarCartCount();

            window.addEventListener('storage', (e) => {
                if (e.key === 'zemen_cart') {
                    updateGlobalNavbarCartCount();
                }
            });

            setInterval(updateGlobalNavbarCartCount, 1000);
        });
    </script>
</body>
</html>
